  <title>经期记录页 - 血量预演</title>
  <style>
    :root {

      --phone-bg: #f2f2f5;

      --icon-weight: url("https://www.figma.com/api/mcp/asset/5e78a726-2afc-460b-bf5b-0c786562490d");
      --icon-weight-inner: url("https://www.figma.com/api/mcp/asset/f09da446-8c62-45d4-89db-073e1cc276be");

      --icon-plan-line-a: url("https://www.figma.com/api/mcp/asset/290277cb-ba0c-4ef2-80c3-7464b6162a50");
      --icon-plan-line-b: url("https://www.figma.com/api/mcp/asset/3bdf4d44-5f84-48b7-84f2-7fd0ad889976");
      --mood-1: url("https://www.figma.com/api/mcp/asset/a1a2890e-e2d8-41d3-8d07-81414fff2358");
      --mood-2: url("https://www.figma.com/api/mcp/asset/7bbc6c3d-4d47-4239-af3c-b5f5ea38d310");
      --mood-3: url("https://www.figma.com/api/mcp/asset/cb61331d-4085-47bd-9eff-4564e1bbc97b");
      --mood-4: url("https://www.figma.com/api/mcp/asset/ac5cfbd9-14db-42fd-8a40-bbf629c4bd55");
      --mood-5: url("https://www.figma.com/api/mcp/asset/0b2e9f2f-1c90-4f5a-8751-4e2fd4b6522e");
      --habit-1: url("https://www.figma.com/api/mcp/asset/f4477641-6d0d-4029-8f45-fe4cd19f7a87");
      --habit-2: url("https://www.figma.com/api/mcp/asset/5ed5a418-e4b8-4885-b29f-b00bb31fa2b0");
      --habit-3: url("https://www.figma.com/api/mcp/asset/fc1e19bb-49bc-4441-a517-5d5bb7ee18fd");
      --habit-4: url("https://www.figma.com/api/mcp/asset/3609edb3-743e-4b50-9a7e-046ad543a622");
      --habit-5: url("https://www.figma.com/api/mcp/asset/4e196435-8474-428b-b6f0-9ec2702aa2b4");
      --period-sheet-image: url("https://www.figma.com/api/mcp/asset/81abc1cd-ddf8-4cc6-a390-98372a96bd47");
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--text);
      font-family: "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 77, 136, 0.12), transparent 28%),
        linear-gradient(180deg, #fafafd 0%, #eef0f6 100%);
    }

    .phone {
      width: 375px;
      height: 812px;
      min-height: 812px;
      background: var(--phone-bg);
      border-radius: 36px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      box-shadow: 0 28px 80px rgba(33, 35, 52, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.85);
      isolation: isolate;
    }

    .demo-controls {
      position: absolute;
      top: 58px;
      right: 12px;
      z-index: 8;
      display: flex;
      gap: 8px;
    }

    .demo-btn {
      min-width: 56px;
      height: 28px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      color: #52545d;
      font-size: 12px;
      box-shadow: 0 8px 20px rgba(31, 35, 46, 0.08);
      cursor: pointer;
    }

    .demo-btn.primary {
      background: var(--pink);
      color: #fff;
    }

    .status-bar {
      height: 44px;
      padding: 14px 15px 0 18px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      color: #000;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.28px;
      background: var(--phone-bg);
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 6px;
      transform: scale(0.95);
      transform-origin: right top;
    }

    .signal {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 12px;
    }

    .signal span {
      width: 3px;
      border-radius: 1px;
      background: #000;
      display: block;
    }

    .signal span:nth-child(1) { height: 4px; }
    .signal span:nth-child(2) { height: 6px; }
    .signal span:nth-child(3) { height: 8px; }
    .signal span:nth-child(4) { height: 10px; }

    .wifi {
      width: 14px;
      height: 10px;
      border: 2px solid #000;
      border-top-color: #000;
      border-right-color: transparent;
      border-bottom-color: transparent;
      border-left-color: transparent;
      border-radius: 50%;
      position: relative;
      transform: rotate(45deg);
      margin-top: -1px;
    }

    .wifi::before,
    .wifi::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      border-style: solid;
      border-top-color: #000;
      border-right-color: transparent;
      border-bottom-color: transparent;
      border-left-color: transparent;
      transform: rotate(0deg);
      inset: 2px;
    }

    .wifi::after {
      inset: 5px;
    }

    .battery {
      width: 24px;
      height: 12px;
      border: 1.5px solid #000;
      border-radius: 3px;
      position: relative;
    }

    .battery::before {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 17px;
      height: 6px;
      background: #000;
      border-radius: 1.5px;
    }

    .battery::after {
      content: "";
      position: absolute;
      right: -3px;
      top: 3px;
      width: 2px;
      height: 4px;
      border-radius: 0 1px 1px 0;
      background: #000;
      opacity: 0.45;
    }

    .topbar {
      height: 44px;
      padding: 0 16px;
      display: grid;
      grid-template-columns: 56px 1fr 36px;
      align-items: center;
      background: var(--phone-bg);
      border-bottom: 1px solid #f0f0f2;
      position: relative;
      z-index: 2;
    }

    .month {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      white-space: nowrap;
      min-width: 0;
      line-height: 1;
    }

    .back {
      width: 24px;
      height: 24px;
      background: var(--icon-back) center / contain no-repeat;
      flex: none;
    }

    .tabs {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 26px;
      font-size: 16px;
      color: var(--subtle);
    }

    .tabs span {
      position: relative;
      padding: 10px 0 12px;
      white-space: nowrap;
    }

    .tabs .active {
      color: var(--pink);
      font-weight: 500;
    }

    .tabs .active::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 20px;
      height: 3px;
      border-radius: 999px;
      background: var(--pink);
    }

    .analysis {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      font-size: 11px;
      color: var(--text);
      line-height: 1;
      position: relative;
    }

    .analysis-icon {
      width: 24px;
      height: 24px;
      background: var(--icon-analysis) center / contain no-repeat;
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      height: 15px;
      padding: 0 3px;
      background: var(--phone-bg);
      color: #c6c6cb;
      font-size: 12px;
      text-align: center;
      letter-spacing: 0.3px;
      align-items: center;
    }

    .calendar {
      background: #fff;
      border-bottom: 0.5px solid #e8e8e8;
      position: relative;
      z-index: 1;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, calc((100% - 18px) / 7));
      grid-auto-rows: 48px;
      column-gap: 2px;
      row-gap: 0;
      padding: 0 3px;
      border-top: 0.5px solid #e8e8e8;
      position: relative;
    }

    .day {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      font-size: 16px;
      color: var(--green);
    }

    .day.empty {
      color: transparent;
    }

    .day.purple {
      color: var(--purple);
    }

    .day.blood-cell {
      overflow: hidden;
      border-radius: 6px;
      isolation: isolate;
      color: #fff;
      background: #ffd6e4;
      transition: background 620ms ease, color 260ms ease, box-shadow 280ms ease;
    }

    .day.blood-cell::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 6px;
      background: transparent;
      border: 1.5px solid transparent;
      box-sizing: border-box;
      z-index: 2; /* 浮在水波之上 */
      pointer-events: none;
      transition: border-color 300ms ease, box-shadow 300ms ease;
    }

    /* 1号选中日默认就有红色描边 + 白色内描边（避免动画时闪一下） */
    #dayOne.blood-cell::before {
      border-color: #ff0000;
      box-shadow: inset 0 0 0 1.5px #ffffff;
    }

    .day.blood-cell .blood {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 0;
      background: #ff4d88;
      border-radius: 0 0 6px 6px;
      pointer-events: none;
      z-index: 0;
      transform: translateZ(0);
      transition:
        height 720ms cubic-bezier(0.33, 1, 0.68, 1),
        background-color 480ms ease,
        opacity 340ms ease;
      will-change: height;
    }

    /* 水波纹：默认隐藏（未记录状态看不到水波） */
    .day.blood-cell .blood::before,
    .day.blood-cell .blood::after {
      content: "";
      position: absolute;
      left: -2px;
      right: -2px;
      top: -5px;
      height: 6px;
      background-repeat: repeat-x;
      background-size: 50px 6px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 320ms ease;
    }

    .day.blood-cell .blood::before {
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 50 6' preserveAspectRatio='none'><path d='M0 3 Q 12.5 0 25 3 T 50 3 L 50 6 L 0 6 Z' fill='%23ff4d88'/></svg>");
      animation: waveShift 2.4s linear infinite;
    }

    .day.blood-cell .blood::after {
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 50 6' preserveAspectRatio='none'><path d='M0 3 Q 12.5 6 25 3 T 50 3 L 50 6 L 0 6 Z' fill='%23ff80aa'/></svg>");
      animation: waveShiftBack 1.8s linear infinite;
      mix-blend-mode: screen;
    }

    /* 预演阶段：水波显现 */
    .day.blood-cell.lit .blood::before,
    .day.blood-cell.filled .blood::before {
      opacity: 0.95;
    }

    .day.blood-cell.lit .blood::after,
    .day.blood-cell.filled .blood::after {
      opacity: 0.55;
    }

    /* 1号选中日在预演/定格各阶段保持：红色描边 + 白色内描边（与默认一致，避免抖动） */
    #dayOne.blood-cell.lit::before,
    #dayOne.blood-cell.filled::before,
    #dayOne.blood-cell.settling::before,
    #dayOne.blood-cell.settled::before {
      border-color: #ff0000;
      box-shadow: inset 0 0 0 1.5px #ffffff;
    }

    .day.blood-cell .blood.filling {
      animation: bloodSurge 560ms cubic-bezier(0.33, 1, 0.68, 1);
    }

    /* 定格阶段：所有格子一起水位涨到100% + 背景转场到最终色 */
    .day.blood-cell.settling .blood,
    .day.blood-cell.settled .blood {
      height: 100% !important;
      background-color: var(--cell-color, #ff4d88);
      transition:
        height 460ms cubic-bezier(0.4, 0, 0.2, 1),
        background-color 460ms ease,
        opacity 360ms ease;
    }

    /* 水波在定格阶段淡出；settling阶段仍让波形滚动（更自然），settled阶段才停 */
    .day.blood-cell.settling .blood::before,
    .day.blood-cell.settling .blood::after {
      opacity: 0 !important;
    }

    .day.blood-cell.settled .blood::before,
    .day.blood-cell.settled .blood::after {
      opacity: 0 !important;
      animation-play-state: paused;
    }

    /* 切到"否"时，no-transition 让所有过渡/关键帧立刻归零 */
    .phone.no-transition,
    .phone.no-transition *,
    .phone.no-transition *::before,
    .phone.no-transition *::after {
      transition: none !important;
      animation: none !important;
    }

    /* 星星 icon：所有格子水波动画结束、同时向上充满接近定格时缩放渐显
       用 transition 而非 animation，避免 settling→settled 类切换时动画被重启造成闪烁 */
    #dayOne.settling i,
    #dayOne.settled i {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    .day > span,
    .day > small,
    .day > i {
      position: relative;
      z-index: 1;
    }

    .day.selected {
      flex-direction: column;
      gap: 0;
      line-height: 1;
      justify-content: center;
    }

    .day.selected i {
      width: 10px;
      height: 10px;
      position: absolute;
      top: 4px;
      left: 50%;
      transform: scale(0.2);
      transform-origin: center;
      opacity: 0;
      background: var(--icon-star) center / contain no-repeat;
      /* 带轻微回弹感的过渡曲线，220ms 延迟让星星在水位接近定格时才出现 */
      transition:
        opacity 300ms cubic-bezier(0.22, 1.2, 0.36, 1) 220ms,
        transform 380ms cubic-bezier(0.22, 1.2, 0.36, 1) 220ms;
    }

    .day.selected.recorded i {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    #dayOne > span {
      position: absolute;
      left: 0;
      right: 0;
      top: 16px;
      height: 16px;
      line-height: 16px;
      text-align: center;
    }

    #dayOne > small {
      position: absolute;
      left: 0;
      right: 0;
      top: 34px;
      height: 10px;
      line-height: 10px;
      text-align: center;
    }


    .row-separator {
      position: absolute;
      height: 0.5px;
      background: #e8e8e8;
      pointer-events: none;
      z-index: 0;
    }

    .day.blood-cell {
      z-index: 1;
    }

    .row-separator.first {
      top: 48px;
      left: calc(3px + 3 * (((100% - 18px) / 7) + 2px));
      right: 0;
    }

    .row-separator.middle-1 {
      top: 96px;
      left: 0;
      right: 0;
    }

    .row-separator.middle-2 {
      top: 144px;
      left: 0;
      right: 0;
    }

    .row-separator.middle-3 {
      top: 192px;
      left: 0;
      right: 0;
    }

    .row-separator.last {
      top: 240px;
      left: 0;
      right: calc(3px + (((100% - 18px) / 7) + 2px));
    }

    .day.selected span,
    .day.selected small {
      display: block;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    .day.selected span {
      line-height: 1;
    }

    .day.selected small {
      font-size: 10px;
      font-weight: 500;
      line-height: 1;
    }

    .legend {
      height: 30px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 13px;
      background: #fff;
      color: #8f9096;
      font-size: 12px;
      border-bottom: 0.5px solid #e8e8e8;
      white-space: nowrap;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .legend-mark {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      display: inline-block;
    }

    .legend-mark.oval {
      background: var(--pink);
    }

    .legend-mark.forecast {
      background: var(--pink-soft);
    }

    .legend-mark.fertile {
      background: var(--purple);
    }

    .legend-mark.ovulation {
      width: 12px;
      height: 12px;
      border-radius: 0;
      background: url("icon-ovulation.png") center / contain no-repeat;
    }

    .legend-arrow {
      margin-left: auto;
      color: #cfcfd4;
      font-size: 22px;
      line-height: 1;
    }

    .content {
      padding: 8px 12px 12px;
      position: absolute;
      top: 373px;
      right: 0;
      bottom: 83px;
      left: 0;
      z-index: 1;
      overflow: hidden;
      padding-bottom: 96px;
      background: var(--phone-bg);
    }

    .list {
      background: var(--card-bg);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 0 1px #ededf0;
    }

    .row {
      height: 48px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 12px;
      background: #fff;
      position: relative;
    }

    .row::after {
      content: "";
      position: absolute;
      left: 50px;
      right: 0;
      bottom: 0;
      height: 0.5px;
      background: #e8e8e8;

  <script>
    const phone = document.getElementById("phone");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const playFlow = document.getElementById("playFlow");
    const resetFlow = document.getElementById("resetFlow");
    const dayOne = document.getElementById("dayOne");

    // 主界面定格色：1号 = 深粉；其余 = 浅粉
    function finalColorFor(id) {
      return id === "dayOne" ? "#ff4d88" : "#ffd6e4";
    }

    const BLOOD_CELLS = [
      { id: "dayOne",   level: 80, delay: 0    },
      { id: "dayTwo",   level: 65, delay: 340  },
      { id: "dayThree", level: 50, delay: 680  },
      { id: "dayFour",  level: 35, delay: 1020 },
      { id: "dayFive",  level: 20, delay: 1360 }
    ];

    const FILL_DURATION = 720;    // 水位上涨时长
    const LIT_DURATION = 480;      // lit -> filled 的保持时长
    const SETTLE_HOLD = 260;       // 注满后停留片刻再触发定格（更自然的过度）
    const SETTLE_DURATION = 480;   // 所有格子同时完成定格的时长

    let flowTimers = [];

    function clearFlowTimers() {
      flowTimers.forEach((t) => window.clearTimeout(t));
      flowTimers = [];
    }

    function setToggleState(isRecorded) {
      yesBtn.classList.toggle("active", isRecorded);
      noBtn.classList.toggle("active", !isRecorded);
    }

    function resetBloodCells() {
      BLOOD_CELLS.forEach(({ id }) => {
        const el = document.getElementById(id);
        const blood = el.querySelector(".blood");
        el.classList.remove("lit", "filled", "settling", "settled");
        el.style.removeProperty("--cell-color");
        if (blood) {
          blood.classList.remove("filling");
          blood.style.height = "0%";
        }
      });
    }

    function lightUpCell({ id, level }) {
      const el = document.getElementById(id);
      const blood = el.querySelector(".blood");
      if (!el || !blood) return;

      el.classList.add("lit");

      blood.classList.remove("filling");
      void blood.offsetWidth;
      blood.classList.add("filling");
      blood.style.height = level + "%";

      const filledTimer = window.setTimeout(() => {
        el.classList.remove("lit");
        el.classList.add("filled");
      }, LIT_DURATION);
      flowTimers.push(filledTimer);
    }

    // 定格：5个格子同时水位涨到100%、水波一起淡出、颜色同时变到最终形态
    function settleAll() {
      BLOOD_CELLS.forEach((cell) => {
        const el = document.getElementById(cell.id);
        const blood = el && el.querySelector(".blood");
        if (!el || !blood) return;
        el.style.setProperty("--cell-color", finalColorFor(cell.id));
        blood.classList.remove("filling");
        el.classList.remove("lit");
        el.classList.add("settling");
      });

      const t = window.setTimeout(() => {
        BLOOD_CELLS.forEach((cell) => {
          const el = document.getElementById(cell.id);
          if (!el) return;
          el.classList.remove("settling");
          el.classList.add("settled");
        });
      }, SETTLE_DURATION);
      flowTimers.push(t);
    }

    // 是 -> 否：瞬时回到未记录状态，不走回退动画
    function resetPage() {
      clearFlowTimers();
      phone.classList.add("no-transition");
      phone.classList.remove("recorded", "previewing");
      resetBloodCells();
      setToggleState(false);
      // 强制回流，让 no-transition 立刻生效
      void phone.offsetWidth;
      // 下一帧后再允许过渡（避免后续操作被误抑制）
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          phone.classList.remove("no-transition");
        });
      });
    }

    function startFlow() {
      clearFlowTimers();
      phone.classList.remove("no-transition", "recorded");
      resetBloodCells();
      setToggleState(true);

      void phone.offsetWidth;

      phone.classList.add("previewing");

      BLOOD_CELLS.forEach((cell) => {
        const t = window.setTimeout(() => lightUpCell(cell), cell.delay);
        flowTimers.push(t);
      });

      const last = BLOOD_CELLS[BLOOD_CELLS.length - 1];
      const fillDoneAt = last.delay + FILL_DURATION;

      // 预演结束后停留片刻，再统一触发定格（更自然的过度）
      const settleTimer = window.setTimeout(settleAll, fillDoneAt + SETTLE_HOLD);
      flowTimers.push(settleTimer);

      const totalDuration = fillDoneAt + SETTLE_HOLD + SETTLE_DURATION;
      const finishTimer = window.setTimeout(() => {
        phone.classList.add("recorded");
        phone.classList.remove("previewing");
      }, totalDuration);
      flowTimers.push(finishTimer);
    }

    yesBtn.addEventListener("click", startFlow);
    playFlow.addEventListener("click", startFlow);
    noBtn.addEventListener("click", resetPage);
    resetFlow.addEventListener("click", resetPage);

    resetPage();
  </script>
</body>
</html>
